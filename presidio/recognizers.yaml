global_regex_flags: 26

supported_languages:
  - en

recognizers:
  - name: CompanyNameRecognizer
    supported_entity: ORGANIZATION
    supported_languages:
      - language: en
        context:
          - company
          - employer
          - contractor
          - vendor
          - client
          - party
          - lessor
          - lessee
    patterns:
      - name: company_suffix_en
        regex: '\b[A-Z][A-Za-z0-9][\w\s&,\.-]*\s+(?:Ltd\.?|Limited|LLC|L\.L\.C\.|Inc\.?|Incorporated|Corp\.?|Corporation|GmbH|s\.r\.o\.|a\.s\.|plc|PLC|B\.V\.|S\.A\.|AG|LLP)\b'
        score: 0.85
    type: custom
    enabled: true