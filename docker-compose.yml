services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - presidio-analyzer
      - presidio-anonymizer

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "5002:3000"

  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    ports:
      - "5001:3000"
