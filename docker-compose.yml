services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PRESIDIO_ANALYZER_URL=http://presidio-analyzer:3000
    depends_on:
      - presidio-analyzer

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:2.2.362
    ports:
      - "5002:3000"
    environment:
      - RECOGNIZER_REGISTRY_CONF_FILE=/usr/conf/recognizers.yaml
    volumes:
      - ./presidio/recognizers.yaml:/usr/conf/recognizers.yaml:ro
