spring:
  application:
    name: agrp-dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

presidio:
  analyzer-url: ${PRESIDIO_ANALYZER_URL:http://localhost:5002}
  anonymizer-url: ${PRESIDIO_ANONYMIZER_URL:http://localhost:5001}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: o4-mini
  base-url: https://api.openai.com
