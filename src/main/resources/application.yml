spring:
  application:
    name: agrp-dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

presidio:
  analyzer-url: http://localhost:5002
  anonymizer-url: http://localhost:5001

openai:
  api-key: ${OPENAI_API_KEY:}
  model: o4-mini
  base-url: https://api.openai.com
